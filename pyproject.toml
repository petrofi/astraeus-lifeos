[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q"
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 100
select = ["E", "F", "W", "I", "N", "D", "UP", "S", "B", "A", "C4", "T10", "ISC", "ICN", "PIE", "PT", "RET", "SIM", "TID", "ARG", "PL", "TRY", "RUF"]
ignore = ["D100", "D104", "D107", "PLR0913"]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101", "D"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
