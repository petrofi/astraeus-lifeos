version: '3.8'

# ===========================================
# ASTRAEUS - Autonomous Life Orchestrator
# Docker Compose Configuration
# ===========================================
# Run with: docker-compose up -d
# ===========================================

services:
  # -----------------------------
  # PostgreSQL Database
  # -----------------------------
  database:
    image: postgres:16-alpine
    container_name: astraeus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astraeus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astraeus_password}
      POSTGRES_DB: ${POSTGRES_DB:-astraeus_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astraeus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - astraeus-network

  # -----------------------------
  # Redis Cache (Optional)
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: astraeus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - astraeus-network

  # -----------------------------
  # ASTRAEUS Bot Application
  # -----------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astraeus-bot
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-astraeus}:${POSTGRES_PASSWORD:-astraeus_password}@database:5432/${POSTGRES_DB:-astraeus_db}
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
    networks:
      - astraeus-network

  # -----------------------------
  # Ollama (Local AI - Optional)
  # -----------------------------
  # Uncomment to run local AI models
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: astraeus-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - astraeus-network
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

# -----------------------------
# Volumes
# -----------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  # ollama_data:
  #   driver: local

# -----------------------------
# Networks
# -----------------------------
networks:
  astraeus-network:
    driver: bridge
